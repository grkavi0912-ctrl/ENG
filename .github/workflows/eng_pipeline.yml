name: ENG Project Pipeline

on:

  push:

    branches:
      - main  # Automatically triggers on push to the main branch

jobs:

  register-dataset:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v3
      - name: Install Dependencies
        run: pip install -r eng/requirements.txt # Use eng/requirements.txt
      - name: Upload Dataset to Hugging Face Hub
        env:
          HF_TOKEN: ${{ secrets.HFTOKEN }}
        run: python eng/data/data_registration.py

  data-prep:

    needs: register-dataset
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Dependencies
        run:  pip install -r eng/requirements.txt
      - name: Run Data Preparation
        env:
          HF_TOKEN: ${{ secrets.HFTOKEN }}
        run: python eng/data/data_preparation.py



  model-training:

    needs: data-prep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Dependencies
        run: pip install -r eng/requirements.txt
      - name: Install MLflow dependencies (for server)
        run: pip install mlflow pyngrok -q
      - name: Set MLFLOW_TRACKING_URI to local server
        run: echo "MLFLOW_TRACKING_URI=http://localhost:5000" >> $GITHUB_ENV
      - name: Start MLflow Server
        run: |
          nohup mlflow ui --host 0.0.0.0 --port 5000 &  # Run MLflow UI in the background
          sleep 5  # Wait for a moment to let the server starts
      - name: Model Building
        env:
          HF_TOKEN: ${{ secrets.HFTOKEN }}
        run: python eng/data/train.py # Assuming your train script is here


  deploy-hosting:

    runs-on: ubuntu-latest
    needs: [model-training,data-prep,register-dataset]
    steps:
      - uses: actions/checkout@v3
      - name: Install Dependencies
        run: pip install -r eng/requirements.txt
      - name: Push files to Frontend Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HFTOKEN }}
        run: python eng/hosting/hosting.py
